<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Builder Gratuit România</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- LANDING -->
  <section id="home">
    <h1>Creează CV-ul tău profesional</h1>
    <p>Rapid, simplu, direct de pe telefon.</p>
    <button onclick="openTemplateMenu()">Alege Template</button>
  </section>

  <!-- SIDEBAR TEMPLATE -->
  <aside id="templateMenu">
    <h2>Selectează un template</h2>
    <div onclick="selectTemplate('modern')">Modern Blue</div>
    <div onclick="selectTemplate('clean')">Minimal Clean</div>
    <button onclick="closeTemplateMenu()">Închide</button>
  </aside>

  <!-- BUILDER -->
  <section id="builder" class="hidden">
    <h2>Completează datele</h2>

    <input type="text" id="name" placeholder="Nume complet">
    <input type="text" id="title" placeholder="Titlu profesional">
    <textarea id="profile" placeholder="Profil profesional"></textarea>
    <textarea id="experience" placeholder="Experiență"></textarea>
    <textarea id="education" placeholder="Educație"></textarea>
    <textarea id="skills" placeholder="Skill-uri"></textarea>

    <button onclick="generateCV()">Generează CV</button>
  </section>

  <!-- PREVIEW -->
  <section id="preview" class="hidden"></section>

  <script src="templates.js"></script>
  <script src="script.js"></script>
</body>
</html>
