<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Builder Gratuit</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f3f6fb;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h1 {
    text-align: center;
    color: #2563eb;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 14px;
    width: 100%;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #1e4fd6;
}

.preview {
    margin-top: 30px;
    padding: 20px;
    border: 2px solid #2563eb;
    border-radius: 10px;
}

.cv-header {
    border-bottom: 2px solid #2563eb;
    padding-bottom: 10px;
    margin-bottom: 15px;
}

.cv-name {
    font-size: 24px;
    font-weight: bold;
}

.cv-title {
    color: #2563eb;
}

.small-text {
    font-size: 14px;
    color: gray;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h1>CV Builder Gratuit</h1>

<div id="formSection">
<input type="text" id="name" placeholder="Nume complet">
<input type="text" id="title" placeholder="Titlu profesional (ex: Operator Call Center)">
<input type="text" id="phone" placeholder="Telefon">
<input type="email" id="email" placeholder="Email">
<input type="text" id="city" placeholder="Oraș">

<textarea id="experience" placeholder="Experiență profesională"></textarea>
<textarea id="education" placeholder="Studii"></textarea>
<textarea id="skills" placeholder="Competențe (separate prin virgulă)"></textarea>

<button onclick="generateCV()">Generează CV</button>
</div>

<div id="previewSection" style="display:none;">
<div class="preview" id="cvPreview"></div>

<button id="downloadBtn" onclick="handleDownload()">Descarcă CV în PDF</button>
<p class="small-text" id="unlockText" style="display:none;">
Pentru a menține acest CV Builder gratuit, este necesar un pas scurt de verificare.  
Completează pasul din noul tab, apoi revino aici și apasă din nou pe buton pentru descărcare.
</p>
</div>

</div>

<script>
let unlocked = false;

function generateCV() {
    const name = document.getElementById("name").value;
    const title = document.getElementById("title").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;
    const city = document.getElementById("city").value;
    const experience = document.getElementById("experience").value;
    const education = document.getElementById("education").value;
    const skills = document.getElementById("skills").value;

    const preview = `
        <div class="cv-header">
            <div class="cv-name">${name}</div>
            <div class="cv-title">${title}</div>
        </div>
        <p><strong>Telefon:</strong> ${phone}</p>
        <p><strong>Email:</strong> ${email}</p>
        <p><strong>Oraș:</strong> ${city}</p>
        <hr>
        <p><strong>Experiență:</strong><br>${experience}</p>
        <p><strong>Studii:</strong><br>${education}</p>
        <p><strong>Competențe:</strong><br>${skills}</p>
    `;

    document.getElementById("cvPreview").innerHTML = preview;
    document.getElementById("previewSection").style.display = "block";
}

function handleDownload() {
    if (!unlocked) {
        window.open("https://YOUR_SMART_LINK_HERE", "_blank");
        document.getElementById("unlockText").style.display = "block";
        unlocked = true;
    } else {
        generatePDF();
    }
}

function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const content = document.getElementById("cvPreview").innerText;
    doc.text(content, 10, 10);
    doc.save("CV.pdf");
}
</script>

</body>
</html>
