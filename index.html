<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Builder Gratuit</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f6f9;
}

/* LANDING */
#home{
text-align:center;
padding:60px 20px;
}
#home h1{
font-size:32px;
color:#1e3c72;
}
#home p{
color:#555;
margin:20px 0;
}
.primary-btn{
padding:14px 25px;
background:#1e3c72;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

/* SIDEBAR */
#sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#111;
color:white;
padding:30px 20px;
transition:0.3s;
z-index:1000;
}
#sidebar h2{
margin-top:0;
}
.template-option{
background:#222;
padding:12px;
margin:10px 0;
cursor:pointer;
border-radius:6px;
}
.template-option:hover{
background:#333;
}
#closeSidebar{
margin-top:20px;
cursor:pointer;
color:#aaa;
}

/* FORM */
#builder{
display:none;
padding:30px 20px;
max-width:600px;
margin:auto;
}
input, textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

/* PREVIEW */
#preview{
display:none;
padding:20px;
background:white;
max-width:800px;
margin:20px auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* TEMPLATE 1 */
.template-modern{
display:flex;
}
.template-modern .left{
width:30%;
background:#1e3c72;
color:white;
padding:20px;
}
.template-modern .right{
width:70%;
padding:20px;
}

/* TEMPLATE 2 */
.template-clean{
padding:20px;
}
.template-clean h2{
border-bottom:2px solid #000;
padding-bottom:5px;
}

.secondary-btn{
padding:12px 20px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
margin-top:15px;
cursor:pointer;
}

.notice{
font-size:12px;
color:#777;
margin-top:8px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
<h1>CV Builder Gratuit</h1>
<p>Creează un CV profesional în 2 minute.</p>
<button class="primary-btn" onclick="openSidebar()">Alege Template</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
<h2>Selectează Template</h2>
<div class="template-option" onclick="selectTemplate('modern')">Modern Blue</div>
<div class="template-option" onclick="selectTemplate('clean')">Minimal Clean</div>
<div id="closeSidebar" onclick="closeSidebar()">Închide</div>
</div>

<!-- BUILDER -->
<div id="builder">
<h2>Completează Datele</h2>
<input type="text" id="name" placeholder="Nume complet">
<input type="text" id="title" placeholder="Titlu profesional">
<textarea id="about" placeholder="Descriere scurtă"></textarea>
<input type="text" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Telefon">
<textarea id="experience" placeholder="Experiență profesională"></textarea>
<button class="primary-btn" onclick="generateCV()">Generează CV</button>
</div>

<!-- PREVIEW -->
<div id="preview"></div>

<script>
let selectedTemplate = "";
let unlocked = false;
let cpaLink = "https://singingfiles.com/show.php?l=0&u=681786&id=72110";

function openSidebar(){
document.getElementById("sidebar").style.left="0";
}
function closeSidebar(){
document.getElementById("sidebar").style.left="-260px";
}

function selectTemplate(template){
selectedTemplate = template;
closeSidebar();
document.getElementById("home").style.display="none";
document.getElementById("builder").style.display="block";
}

function generateCV(){
let name=document.getElementById("name").value;
let title=document.getElementById("title").value;
let about=document.getElementById("about").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let exp=document.getElementById("experience").value;

let preview=document.getElementById("preview");

if(selectedTemplate==="modern"){
preview.innerHTML=`
<div class="template-modern">
<div class="left">
<h2>${name}</h2>
<p>${title}</p>
<p>${email}</p>
<p>${phone}</p>
</div>
<div class="right">
<h3>Profil</h3>
<p>${about}</p>
<h3>Experiență</h3>
<p>${exp}</p>
</div>
</div>
<button class="secondary-btn" onclick="downloadCV()">Descarcă CV</button>
<p class="notice">Descărcarea este disponibilă gratuit.</p>
`;
}

if(selectedTemplate==="clean"){
preview.innerHTML=`
<div class="template-clean">
<h2>${name}</h2>
<p><strong>${title}</strong></p>
<p>${email} | ${phone}</p>
<h3>Profil</h3>
<p>${about}</p>
<h3>Experiență</h3>
<p>${exp}</p>
</div>
<button class="secondary-btn" onclick="downloadCV()">Descarcă CV</button>
<p class="notice">Descărcarea este disponibilă gratuit.</p>
`;
}

document.getElementById("preview").style.display="block";
}

function downloadCV(){
if(!unlocked){
unlocked=true;
window.open(cpaLink,"_blank");
return;
}

let content=document.getElementById("preview").innerText;
let blob=new Blob([content],{type:"text/plain"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="CV.txt";
a.click();
}
</script>

</body>
</html>
